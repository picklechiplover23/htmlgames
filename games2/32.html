<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="" xml:lang="">
  <head>
    <base
      href="https://gcore.jsdelivr.net/gh/Stinkalistic/UGS@main/MISC/dungeongamble/"
    />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <title>Dungeons & Degenerate Gamblers</title>
    <style type="text/css">
      body {
        touch-action: none;
        margin: 0;
        border: 0 none;
        padding: 0;
        text-align: center;
        background-color: black;
      }

      #canvas {
        display: block;
        margin: 0;
        color: white;
      }

      #canvas:focus {
        outline: none;
      }

      .godot {
        font-family: "Noto Sans", "Droid Sans", Arial, sans-serif;
        color: #e0e0e0;
        background-color: #3b3943;
        background-image: linear-gradient(to bottom, #403e48, #35333c);
        border: 1px solid #45434e;
        box-shadow: 0 0 1px 1px #2f2d35;
      }

      /* Status display
		 * ============== */

      #status {
        position: absolute;
        left: 0;
        top: 0;
        right: 0;
        bottom: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        /* don't consume click events - make children visible explicitly */
        visibility: hidden;
      }

      #status-progress {
        width: 366px;
        height: 7px;
        background-color: #38363a;
        border: 1px solid #444246;
        padding: 1px;
        box-shadow: 0 0 2px 1px #1b1c22;
        border-radius: 2px;
        visibility: visible;
      }

      @media only screen and (orientation: portrait) {
        #status-progress {
          width: 61.8%;
        }
      }

      #status-progress-inner {
        height: 100%;
        width: 0;
        box-sizing: border-box;
        transition: width 0.5s linear;
        background-color: #202020;
        border: 1px solid #222223;
        box-shadow: 0 0 1px 1px #27282e;
        border-radius: 3px;
      }

      #status-indeterminate {
        height: 42px;
        visibility: visible;
        position: relative;
      }

      #status-indeterminate > div {
        width: 4.5px;
        height: 0;
        border-style: solid;
        border-width: 9px 3px 0 3px;
        border-color: #2b2b2b transparent transparent transparent;
        transform-origin: center 21px;
        position: absolute;
      }

      #status-indeterminate > div:nth-child(1) {
        transform: rotate(22.5deg);
      }
      #status-indeterminate > div:nth-child(2) {
        transform: rotate(67.5deg);
      }
      #status-indeterminate > div:nth-child(3) {
        transform: rotate(112.5deg);
      }
      #status-indeterminate > div:nth-child(4) {
        transform: rotate(157.5deg);
      }
      #status-indeterminate > div:nth-child(5) {
        transform: rotate(202.5deg);
      }
      #status-indeterminate > div:nth-child(6) {
        transform: rotate(247.5deg);
      }
      #status-indeterminate > div:nth-child(7) {
        transform: rotate(292.5deg);
      }
      #status-indeterminate > div:nth-child(8) {
        transform: rotate(337.5deg);
      }
      @import url("https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap");

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
      }

      .window-specefic {
        position: absolute;
        top: 100px;
        left: 100px;
        width: 300px;
        height: 200px;
        width: 600px;
        height: 500px;
        z-index: 9999999999999;
      }

      .titlebar-specefic {
        display: flex;
        align-items: center;
        gap: 7px;
        padding-left: 2px;
        width: 100%;
        font-family: "Work Sans", sans-serif;
        font-size: 13px;
        background-color: rgb(50, 55, 61);
        border-top-right-radius: 7px;
        border-top-left-radius: 7px;
        color: white;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        cursor: move;
      }

      #the-logo-specefic {
        width: 25px;
        height: 25px;
      }

      #geen-specefic {
        color: rgb(149, 206, 149);
      }

      .content-specefic {
        height: 100%;
        width: 100%;
        border-left: solid 1px black;
        border-right: solid 1px black;
        border-bottom: solid 1px black;
        border-bottom-right-radius: 7px;
        border-bottom-left-radius: 7px;
      }

      .content-specefic * {
        margin: 0;
      }

      .header-specefic {
        display: flex;
        gap: 8px;
        background-color: rgb(91, 97, 107);
        color: rgb(229, 231, 235);
        border-bottom: 1px solid rgb(176, 213, 238);
        font-family: "Work Sans", sans-serif;
        font-weight: 0;
      }

      .option-specefic {
        padding: 3px;
        transition: background-color 0.3s ease;
      }

      .selected-specefic {
        border-bottom: 3px solid rgb(165, 204, 230);
        border-radius: 4px;
      }

      .option-specefic:hover {
        background-color: rgb(108, 115, 126);
        cursor: pointer;
      }

      #stuff-specefic {
        width: 100%;
        height: 100%;
      }

      #status-notice {
        margin: 0 100px;
        line-height: 1.3;
        visibility: visible;
        padding: 4px 6px;
        visibility: visible;
      }
    </style>
    <link
      id="-gd-engine-icon"
      rel="icon"
      type="image/png"
      href="gamble.icon.png"
    />
    <link rel="apple-touch-icon" href="gamble.apple-touch-icon.png" />
  </head>
  <body>
    <canvas id="canvas">
      HTML5 canvas appears to be unsupported in the current browser.<br />
      Please try updating or use a different browser.
    </canvas>
    <div id="status">
      <div
        id="status-progress"
        style="display: none"
        oncontextmenu="event.preventDefault()"
      >
        <div id="status-progress-inner"></div>
      </div>
      <div
        id="status-indeterminate"
        style="display: none"
        oncontextmenu="event.preventDefault()"
      >
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
      <div id="status-notice" class="godot" style="display: none"></div>
    </div>

    <script src="main.js"></script>
    <script type="text/javascript" src="gamble.js"></script>
    <script type="text/javascript">
      //<![CDATA[

      window.godotRunStart = function () {
        const GODOT_CONFIG = {
          args: [],
          canvasResizePolicy: 2,
          executable: "gamble",
          experimentalVK: false,
          fileSizes: { "index.pck": 97937408, "gamble.wasm": 25658069 },
          focusCanvas: true,
          gdnativeLibs: [],
        };
        var engine = new Engine(GODOT_CONFIG);

        (function () {
          const INDETERMINATE_STATUS_STEP_MS = 100;
          var statusProgress = document.getElementById("status-progress");
          var statusProgressInner = document.getElementById(
            "status-progress-inner",
          );
          var statusIndeterminate = document.getElementById(
            "status-indeterminate",
          );
          var statusNotice = document.getElementById("status-notice");

          var initializing = true;
          var statusMode = "hidden";

          var animationCallbacks = [];
          function animate(time) {
            animationCallbacks.forEach((callback) => callback(time));
            requestAnimationFrame(animate);
          }
          requestAnimationFrame(animate);

          function setStatusMode(mode) {
            if (statusMode === mode || !initializing) return;
            [statusProgress, statusIndeterminate, statusNotice].forEach(
              (elem) => {
                elem.style.display = "none";
              },
            );
            animationCallbacks = animationCallbacks.filter(function (value) {
              return value != animateStatusIndeterminate;
            });
            switch (mode) {
              case "progress":
                statusProgress.style.display = "block";
                break;
              case "indeterminate":
                statusIndeterminate.style.display = "block";
                animationCallbacks.push(animateStatusIndeterminate);
                break;
              case "notice":
                statusNotice.style.display = "block";
                break;
              case "hidden":
                break;
              default:
                throw new Error("Invalid status mode");
            }
            statusMode = mode;
          }

          function animateStatusIndeterminate(ms) {
            var i = Math.floor((ms / INDETERMINATE_STATUS_STEP_MS) % 8);
            if (statusIndeterminate.children[i].style.borderTopColor == "") {
              Array.prototype.slice
                .call(statusIndeterminate.children)
                .forEach((child) => {
                  child.style.borderTopColor = "";
                });
              statusIndeterminate.children[i].style.borderTopColor = "#dfdfdf";
            }
          }

          function setStatusNotice(text) {
            while (statusNotice.lastChild) {
              statusNotice.removeChild(statusNotice.lastChild);
            }
            var lines = text.split("\n");
            lines.forEach((line) => {
              statusNotice.appendChild(document.createTextNode(line));
              statusNotice.appendChild(document.createElement("br"));
            });
          }

          function displayFailureNotice(err) {
            var msg = err.message || err;
            console.error(msg);
            setStatusNotice(msg);
            setStatusMode("notice");
            initializing = false;
          }

          if (!Engine.isWebGLAvailable()) {
            displayFailureNotice("WebGL not available");
          } else {
            setStatusMode("indeterminate");
            engine
              .startGame({
                onProgress: function (current, total) {
                  if (total > 0) {
                    statusProgressInner.style.width =
                      (current / total) * 100 + "%";
                    setStatusMode("progress");
                    if (current === total) {
                      // wait for progress bar animation
                      setTimeout(() => {
                        setStatusMode("indeterminate");
                      }, 500);
                    }
                  } else {
                    setStatusMode("indeterminate");
                  }
                },
              })
              .then(() => {
                setStatusMode("hidden");
                initializing = false;
              }, displayFailureNotice);
          }
        })();
      };
      //]]>
    </script>
    <script src="https://gcore.jsdelivr.net/npm/monaco-editor@0.43.0/min/vs/loader.js"></script>
    <script src="../devtools/vaccine.js"></script>
  </body>
</html>
