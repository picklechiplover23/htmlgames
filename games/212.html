<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0"
    />
    <base
      href="https://cdn.jsdelivr.net/gh/SomeRandomFella/portsandrips@master/upstream/"
    />
    <title>UpstreamGame</title>
    <style>
      html,
      body,
      #canvas {
        margin: 0;
        padding: 0;
        border: 0;
      }

      body {
        color: white;
        background-color: black;
        overflow: hidden;
        touch-action: none;
      }

      #canvas {
        display: block;
      }

      #canvas:focus {
        outline: none;
      }

      #status,
      #status-splash,
      #status-progress {
        position: absolute;
        left: 0;
        right: 0;
      }

      #status,
      #status-splash {
        top: 0;
        bottom: 0;
      }

      #status {
        background-color: #000000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        visibility: hidden;
      }

      #status-splash {
        max-height: 100%;
        max-width: 100%;
        margin: auto;
      }

      #status-splash.show-image--false {
        display: none;
      }

      #status-splash.fullsize--true {
        height: 100%;
        width: 100%;
        object-fit: contain;
      }

      #status-splash.use-filter--false {
        image-rendering: pixelated;
      }

      #status-progress,
      #status-notice {
        display: none;
      }

      #status-progress {
        bottom: 10%;
        width: 50%;
        margin: 0 auto;
      }

      #status-notice {
        background-color: #5b3943;
        border-radius: 0.5rem;
        border: 1px solid #9b3943;
        color: #e0e0e0;
        font-family: "Noto Sans", "Droid Sans", Arial, sans-serif;
        line-height: 1.3;
        margin: 0 2rem;
        overflow: hidden;
        padding: 1rem;
        text-align: center;
        z-index: 1;
      }
    </style>
    <link
      id="-gd-engine-icon"
      rel="icon"
      type="image/png"
      href="UpstreamGame.icon.png"
    />
    <link rel="apple-touch-icon" href="UpstreamGame.apple-touch-icon.png" />
  </head>
  <body>
    <canvas id="canvas"> Your browser does not support the canvas tag. </canvas>

    <noscript> Your browser does not support JavaScript. </noscript>

    <div id="status">
      <img
        id="status-splash"
        class="show-image--true fullsize--true use-filter--false"
        src="UpstreamGame.png"
        alt=""
      />
      <progress id="status-progress"></progress>
      <div id="status-notice"></div>
    </div>

    <script src="UpstreamGame.js"></script>
    <script>
      const GODOT_CONFIG = {
        args: [],
        canvasResizePolicy: 2,
        emscriptenPoolSize: 8,
        ensureCrossOriginIsolationHeaders: false,
        executable: "UpstreamGame",
        experimentalVK: false,
        fileSizes: {
          "UpstreamGame.pck": 45088696,
          "UpstreamGame.wasm": 35739700,
        },
        focusCanvas: true,
        gdextensionLibs: [],
        godotPoolSize: 4,
      };
      const GODOT_THREADS_ENABLED = false;
      const engine = new Engine(GODOT_CONFIG);

      (function () {
        const statusOverlay = document.getElementById("status");
        const statusProgress = document.getElementById("status-progress");
        const statusNotice = document.getElementById("status-notice");

        let initializing = true;
        let statusMode = "";

        function setStatusMode(mode) {
          if (statusMode === mode || !initializing) return;
          if (mode === "hidden") {
            statusOverlay.remove();
            initializing = false;
            return;
          }
          statusOverlay.style.visibility = "visible";
          statusProgress.style.display = mode === "progress" ? "block" : "none";
          statusNotice.style.display = mode === "notice" ? "block" : "none";
          statusMode = mode;
        }

        function setStatusNotice(text) {
          while (statusNotice.lastChild)
            statusNotice.removeChild(statusNotice.lastChild);
          text.split("\n").forEach((line) => {
            statusNotice.appendChild(document.createTextNode(line));
            statusNotice.appendChild(document.createElement("br"));
          });
        }

        function displayFailureNotice(err) {
          console.error(err);
          if (err instanceof Error) setStatusNotice(err.message);
          else if (typeof err === "string") setStatusNotice(err);
          else setStatusNotice("An unknown error occurred.");
          setStatusMode("notice");
          initializing = false;
        }

        async function fetchParts(baseName, numParts) {
          const buffers = [];
          for (let i = 1; i <= numParts; i++) {
            const part = String(i).padStart(3, "0");
            const url = `${baseName}.part${part}`;
            const res = await fetch(url);
            if (!res.ok)
              throw new Error(`Failed to fetch ${url}: ${res.status}`);
            buffers.push(await res.arrayBuffer());
          }
          const total = buffers.reduce((sum, b) => sum + b.byteLength, 0);
          const combined = new Uint8Array(total);
          let offset = 0;
          for (const buf of buffers) {
            combined.set(new Uint8Array(buf), offset);
            offset += buf.byteLength;
          }
          return combined.buffer;
        }

        // Pre-fetch and store blob URLs before engine starts
        async function prepareFiles() {
          setStatusMode("progress");
          statusProgress.removeAttribute("value");
          statusProgress.removeAttribute("max");

          const [pckBuffer, wasmBuffer] = await Promise.all([
            fetchParts("UpstreamGame.pck", 3),
            fetchParts("UpstreamGame.wasm", 2),
          ]);

          const pckUrl = URL.createObjectURL(
            new Blob([pckBuffer], { type: "application/octet-stream" }),
          );
          const wasmUrl = URL.createObjectURL(
            new Blob([wasmBuffer], { type: "application/wasm" }),
          );

          return { pckUrl, wasmUrl };
        }

        // Intercept fetch calls so any request for UpstreamGame.wasm or .pck
        // gets redirected to our pre-built blob URLs
        function installFetchInterceptor(pckUrl, wasmUrl) {
          const originalFetch = window.fetch;
          window.fetch = function (input, init) {
            const url = input instanceof Request ? input.url : String(input);
            if (url.includes("UpstreamGame.wasm")) {
              console.log("[interceptor] redirecting wasm fetch to blob");
              return originalFetch(wasmUrl, init);
            }
            if (url.includes("UpstreamGame.pck")) {
              console.log("[interceptor] redirecting pck fetch to blob");
              return originalFetch(pckUrl, init);
            }
            return originalFetch(input, init);
          };

          // Also intercept XMLHttpRequest in case Godot/Emscripten uses it
          const originalOpen = XMLHttpRequest.prototype.open;
          XMLHttpRequest.prototype.open = function (method, url, ...rest) {
            if (typeof url === "string" && url.includes("UpstreamGame.wasm")) {
              console.log("[interceptor] redirecting wasm XHR to blob");
              return originalOpen.call(this, method, wasmUrl, ...rest);
            }
            if (typeof url === "string" && url.includes("UpstreamGame.pck")) {
              console.log("[interceptor] redirecting pck XHR to blob");
              return originalOpen.call(this, method, pckUrl, ...rest);
            }
            return originalOpen.call(this, method, url, ...rest);
          };
        }

        const missing = Engine.getMissingFeatures({ threads: false }).filter(
          (f) =>
            !f.toLowerCase().includes("thread") &&
            !f.toLowerCase().includes("shared") &&
            !f.toLowerCase().includes("atomics") &&
            !f.toLowerCase().includes("cross-origin"),
        );

        if (missing.length !== 0) {
          const missingMsg =
            "Error\nThe following features required to run Godot projects on the Web are missing:\n";
          displayFailureNotice(missingMsg + missing.join("\n"));
        } else {
          prepareFiles()
            .then(({ pckUrl, wasmUrl }) => {
              installFetchInterceptor(pckUrl, wasmUrl);
              setStatusMode("progress");
              return engine.startGame({
                onProgress(current, total) {
                  if (current > 0 && total > 0) {
                    statusProgress.value = current;
                    statusProgress.max = total;
                  } else {
                    statusProgress.removeAttribute("value");
                    statusProgress.removeAttribute("max");
                  }
                },
              });
            })
            .then(() => {
              setStatusMode("hidden");
            })
            .catch(displayFailureNotice);
        }
      })();
    </script>
  </body>
</html>
