<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GBA Browser Player</title>
    <style>
      body,
      html {
        margin: 0;
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/nostalgist@latest/dist/nostalgist.umd.js"></script>
    <script>
      Nostalgist.launch({
        core: "mgba",
        rom: "https://cdn.jsdelivr.net/gh/SomeRandomFella/portsandrips/fireemblem/fire.gba",
        element: "",
      });
    </script>
  </body>
</html>
