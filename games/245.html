<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Roulette Hero</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

#unity-container {
  width: 100vw;
  height: 100vh;
  position: relative;
}

#unity-canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}

#unity-loading-bar {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
}

#unity-footer {
  position: absolute;
  bottom: 0;
  width: 100%;
  z-index: 10;
}

#unity-fullscreen-button {
  position: absolute;
  bottom: 10px;
  right: 10px;
  cursor: pointer;
  z-index: 11;
}

#sidebarad1,
#sidebarad2 {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 160px;
  height: 600px;
  padding: 0;
  margin: 0;
  z-index: 999999;
}
#sidebarad1 { left: 0; }
#sidebarad2 { right: 0; }
.sidebar-close {
  position: absolute;
  top: 0;
  right: 0;
  width: 22px;
  height: 22px;
  line-height: 22px;
  text-align: center;
  background: rgba(0,0,0,0.7);
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
  z-index: 10;
}
.sidebar-frame {
  width: 160px;
  height: 600px;
  border: none;
  display: block;
}
  </style>
</head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Roulette Hero</div>
      </div>
    </div>
    <script>
      const BASE_URL = "https://cdn.jsdelivr.net/gh/shayderrr/portsv4@f062252f3248db5a493ede8b57e68a29ae96dee3/15819845/Build/";
      var canvas = document.querySelector("#unity-canvas");

      // Size canvas to fill the window
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      async function fetchAndMerge(fileParts) {
        const blobs = await Promise.all(fileParts.map(part => 
          fetch(BASE_URL + part).then(res => {
            if (!res.ok) throw new Error("Failed to load part: " + part);
            return res.blob();
          })
        ));
        return URL.createObjectURL(new Blob(blobs));
      }

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      (async () => {
        try {
          const dataParts = ["Web.data.br.part1", "Web.data.br.part2", "Web.data.br.part3", "Web.data.br.part4", "Web.data.br.part5"];
          const wasmParts = ["Web.wasm.br.part1", "Web.wasm.br.part2", "Web.wasm.br.part3"];

          const [mergedDataUrl, mergedWasmUrl] = await Promise.all([
            fetchAndMerge(dataParts),
            fetchAndMerge(wasmParts)
          ]);

          var config = {
            arguments: [],
            dataUrl: mergedDataUrl,
            frameworkUrl: BASE_URL + "Web.framework.js",
            codeUrl: mergedWasmUrl,
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Free Lives",
            productName: "Roulette Hero",
            productVersion: "0.1",
            showBanner: unityShowBanner,
          };

          var script = document.createElement("script");
          script.src = BASE_URL + "Web.loader.js";
          script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
              document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
            }).then((unityInstance) => {
              document.querySelector("#unity-loading-bar").style.display = "none";
              document.querySelector("#unity-fullscreen-button").onclick = () => {
                unityInstance.SetFullscreen(1);
              };
            }).catch((message) => {
              alert(message);
            });
          };
          document.body.appendChild(script);

        } catch (e) {
          console.error(e);
          unityShowBanner("Error merging assets: " + e.message, "error");
        }
      })();
    </script>
  <div id="sidebarad1">
  <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
</div>
<div id="sidebarad2">
  <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
</div>
</body>
</html>
