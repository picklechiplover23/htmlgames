<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="" xml:lang="">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <title>Brotato</title>
    <base href="https://cdn.jsdelivr.net/gh/wasm-rip/brotatodlc-web/" />
    <style type="text/css">
      body {
        touch-action: none;
        margin: 0;
        border: 0 none;
        padding: 0;
        text-align: center;
        background-color: black;
      }
      #canvas {
        display: block;
        margin: 0;
        color: white;
      }
      #canvas:focus {
        outline: none;
      }
      .godot {
        font-family: "Noto Sans", "Droid Sans", Arial, sans-serif;
        color: #e0e0e0;
        background-color: #3b3943;
        background-image: linear-gradient(to bottom, #403e48, #35333c);
        border: 1px solid #45434e;
        box-shadow: 0 0 1px 1px #2f2d35;
      }
      #status {
        position: absolute;
        left: 0;
        top: 0;
        right: 0;
        bottom: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 10px;
        visibility: hidden;
      }
      #status-progress {
        width: 366px;
        height: 7px;
        background-color: #38363a;
        border: 1px solid #444246;
        padding: 1px;
        box-shadow: 0 0 2px 1px #1b1c22;
        border-radius: 2px;
        visibility: visible;
      }
      @media only screen and (orientation: portrait) {
        #status-progress {
          width: 61.8%;
        }
      }
      #status-progress-inner {
        height: 100%;
        width: 0;
        box-sizing: border-box;
        transition: width 0.3s linear;
        background-color: #202020;
        border: 1px solid #222223;
        box-shadow: 0 0 1px 1px #27282e;
        border-radius: 3px;
      }
      #status-indeterminate {
        height: 42px;
        visibility: visible;
        position: relative;
      }
      #status-indeterminate > div {
        width: 4.5px;
        height: 0;
        border-style: solid;
        border-width: 9px 3px 0 3px;
        border-color: #2b2b2b transparent transparent transparent;
        transform-origin: center 21px;
        position: absolute;
      }
      #status-indeterminate > div:nth-child(1) {
        transform: rotate(22.5deg);
      }
      #status-indeterminate > div:nth-child(2) {
        transform: rotate(67.5deg);
      }
      #status-indeterminate > div:nth-child(3) {
        transform: rotate(112.5deg);
      }
      #status-indeterminate > div:nth-child(4) {
        transform: rotate(157.5deg);
      }
      #status-indeterminate > div:nth-child(5) {
        transform: rotate(202.5deg);
      }
      #status-indeterminate > div:nth-child(6) {
        transform: rotate(247.5deg);
      }
      #status-indeterminate > div:nth-child(7) {
        transform: rotate(292.5deg);
      }
      #status-indeterminate > div:nth-child(8) {
        transform: rotate(337.5deg);
      }
      #status-notice {
        margin: 0 100px;
        line-height: 1.3;
        visibility: visible;
        padding: 4px 6px;
      }
      #status-label {
        font-family: "Noto Sans", "Droid Sans", Arial, sans-serif;
        color: #888;
        font-size: 12px;
        visibility: visible;
      }
    </style>
    <link
      id="-gd-engine-icon"
      rel="icon"
      type="image/png"
      href="Brotato.icon.png"
    />
    <link rel="apple-touch-icon" href="Brotato.apple-touch-icon.png" />
  </head>
  <body>
    <canvas id="canvas">
      HTML5 canvas appears to be unsupported in the current browser.<br />
      Please try updating or use a different browser.
    </canvas>
    <div id="status">
      <div
        id="status-progress"
        style="display: none"
        oncontextmenu="event.preventDefault()"
      >
        <div id="status-progress-inner"></div>
      </div>
      <div
        id="status-indeterminate"
        style="display: none"
        oncontextmenu="event.preventDefault()"
      >
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
      <div id="status-label" style="display: none"></div>
      <div id="status-notice" class="godot" style="display: none"></div>
    </div>

    <script type="text/javascript">
      //<![CDATA[
      (async () => {
        // ── UI helpers ──────────────────────────────────────────────────────────
        const statusProgress = document.getElementById("status-progress");
        const statusProgressInner = document.getElementById(
          "status-progress-inner",
        );
        const statusIndeterminate = document.getElementById(
          "status-indeterminate",
        );
        const statusLabel = document.getElementById("status-label");
        const statusNotice = document.getElementById("status-notice");

        let initializing = true;
        let statusMode = "hidden";
        const animCbs = [];

        requestAnimationFrame(function loop(t) {
          animCbs.forEach((f) => f(t));
          requestAnimationFrame(loop);
        });

        function animSpin(ms) {
          const i = Math.floor((ms / 100) % 8);
          if (!statusIndeterminate.children[i].style.borderTopColor) {
            Array.from(statusIndeterminate.children).forEach(
              (c) => (c.style.borderTopColor = ""),
            );
            statusIndeterminate.children[i].style.borderTopColor = "#dfdfdf";
          }
        }

        function setMode(mode) {
          if (statusMode === mode || !initializing) return;
          [
            statusProgress,
            statusIndeterminate,
            statusNotice,
            statusLabel,
          ].forEach((el) => (el.style.display = "none"));
          const idx = animCbs.indexOf(animSpin);
          if (idx !== -1) animCbs.splice(idx, 1);
          switch (mode) {
            case "progress":
              statusProgress.style.display = "block";
              statusLabel.style.display = "block";
              break;
            case "indeterminate":
              statusIndeterminate.style.display = "block";
              statusLabel.style.display = "block";
              animCbs.push(animSpin);
              break;
            case "notice":
              statusNotice.style.display = "block";
              break;
          }
          statusMode = mode;
        }

        function setLabel(t) {
          statusLabel.textContent = t;
        }
        function setProgress(v) {
          statusProgressInner.style.width = (v * 100).toFixed(1) + "%";
        }

        function showError(err) {
          const msg = err.message || String(err);
          console.error(msg);
          statusNotice.innerHTML = "";
          msg.split("\n").forEach((line) => {
            statusNotice.appendChild(document.createTextNode(line));
            statusNotice.appendChild(document.createElement("br"));
          });
          setMode("notice");
          initializing = false;
        }

        // ── Part fetcher ────────────────────────────────────────────────────────
        async function fetchParts(urls, onProgress) {
          const sizes = await Promise.all(
            urls.map(async (url) => {
              try {
                const r = await fetch(url, { method: "HEAD" });
                return (
                  parseInt(r.headers.get("content-length") || "0", 10) || 0
                );
              } catch {
                return 0;
              }
            }),
          );
          const totalKnown = sizes.reduce((a, b) => a + b, 0);
          const loaded = new Array(urls.length).fill(0);

          const buffers = await Promise.all(
            urls.map(async (url, idx) => {
              const res = await fetch(url);
              if (!res.ok)
                throw new Error(`HTTP ${res.status} fetching ${url}`);
              const reader = res.body.getReader();
              const chunks = [];
              let n = 0;
              for (;;) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
                n += value.length;
                loaded[idx] = n;
                const tot = totalKnown || loaded.reduce((a, b) => a + b, 0);
                onProgress(
                  loaded.reduce((a, b) => a + b, 0),
                  tot,
                );
              }
              const out = new Uint8Array(n);
              let p = 0;
              for (const c of chunks) {
                out.set(c, p);
                p += c.length;
              }
              return out;
            }),
          );

          const total = buffers.reduce((a, b) => a + b.length, 0);
          const out = new Uint8Array(total);
          let p = 0;
          for (const b of buffers) {
            out.set(b, p);
            p += b.length;
          }
          return out.buffer;
        }

        // ── Part URL lists ──────────────────────────────────────────────────────
        // PCK:  index.pck.part01 … index.pck.part11  (11 parts)
        // WASM: index.wasm.part1 … index.wasm.part2  (2 parts)
        const pckUrls = Array.from(
          { length: 11 },
          (_, i) => `index.pck.part${String(i + 1).padStart(2, "0")}`,
        );

        const wasmUrls = Array.from(
          { length: 2 },
          (_, i) => `index.wasm.part${i + 1}`,
        );

        // ── Download phase ──────────────────────────────────────────────────────
        setMode("progress");
        setLabel("Downloading engine (wasm 1/2)…");
        setProgress(0);

        let wasmBuffer, pckBuffer;
        try {
          wasmBuffer = await fetchParts(wasmUrls, (loaded, total) => {
            if (total > 0) setProgress((loaded / total) * 0.25);
          });

          setLabel("Downloading game data (pck 2/2)…");
          setProgress(0.25);

          pckBuffer = await fetchParts(pckUrls, (loaded, total) => {
            if (total > 0) setProgress(0.25 + (loaded / total) * 0.7);
          });
        } catch (err) {
          showError(err);
          return;
        }

        // Build blob URLs for the fully-assembled files
        const wasmBlobUrl = URL.createObjectURL(
          new Blob([wasmBuffer], { type: "application/wasm" }),
        );
        const pckBlobUrl = URL.createObjectURL(
          new Blob([pckBuffer], { type: "application/octet-stream" }),
        );

        setProgress(0.96);
        setLabel("Starting…");
        setMode("indeterminate");

        // ── Monkey-patch fetch + XHR BEFORE loading index.js ───────────────────
        // Godot's emscripten JS requests 'index.wasm' and 'index.pck' by name.
        // We intercept those and serve our pre-assembled blobs instead.
        const _origFetch = window.fetch.bind(window);
        window.fetch = function (input, init) {
          const url = input instanceof Request ? input.url : String(input);
          const name = url.split("?")[0].split("/").pop();
          if (name === "index.wasm") {
            console.log("[parts] serving assembled index.wasm blob");
            return _origFetch(wasmBlobUrl, init);
          }
          if (name === "index.pck") {
            console.log("[parts] serving assembled index.pck blob");
            return _origFetch(pckBlobUrl, init);
          }
          return _origFetch(input, init);
        };

        const _origXHROpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function (method, url, ...rest) {
          const name = String(url).split("?")[0].split("/").pop();
          if (name === "index.wasm") {
            console.log("[parts] XHR serving assembled index.wasm blob");
            return _origXHROpen.call(this, method, wasmBlobUrl, ...rest);
          }
          if (name === "index.pck") {
            console.log("[parts] XHR serving assembled index.pck blob");
            return _origXHROpen.call(this, method, pckBlobUrl, ...rest);
          }
          return _origXHROpen.call(this, method, url, ...rest);
        };

        // ── Load index.js dynamically (patches already live) ───────────────────
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = "index.js";
          s.onload = resolve;
          s.onerror = () => reject(new Error("Failed to load index.js"));
          document.head.appendChild(s);
        });

        // ── Start the engine ────────────────────────────────────────────────────
        const GODOT_CONFIG = {
          args: [],
          canvasResizePolicy: 2,
          executable: "index",
          experimentalVK: false,
          fileSizes: { "index.pck": 203938672, "index.wasm": 26156492 },
          focusCanvas: true,
          gdnativeLibs: [],
        };

        const engine = new Engine(GODOT_CONFIG);

        engine
          .startGame({
            onProgress(current, total) {
              if (total > 0) {
                statusProgressInner.style.width = (current / total) * 100 + "%";
                setMode("progress");
                if (current === total) {
                  setTimeout(() => setMode("indeterminate"), 500);
                }
              } else {
                setMode("indeterminate");
              }
            },
          })
          .then(() => {
            setMode("hidden");
            initializing = false;
            URL.revokeObjectURL(wasmBlobUrl);
            URL.revokeObjectURL(pckBlobUrl);
            window.fetch = _origFetch;
            XMLHttpRequest.prototype.open = _origXHROpen;
          }, showError);
      })();
      //]]>
    </script>
  </body>
</html>
