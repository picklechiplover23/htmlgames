<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <!-- base href="https://cdn.jsdelivr.net/gh/Reeyuki/PlagueIncEvolved/" -->
    <title>Plague Inc</title>

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: black;
      }

      #unity-canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: #0b0b0b;
        color: white;
        font-family: sans-serif;
      }

      #bar {
        width: 60%;
        height: 12px;
        background: #333;
      }

      #fill {
        height: 100%;
        width: 0%;
        background: #4caf50;
      }
    </style>
  </head>

  <body>
    <div id="loader">
      <div id="text">35.8 MB / 317 MB</div>
      <div id="bar"><div id="fill" style="width: 11.3%"></div></div>
    </div>

    <canvas id="unity-canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/gh/Reeyuki/PlagueIncEvolved/Build/bb0d9ecdb05db3e84da20bd14a4f84dc.loader.js"></script>

    <script>
      const baseBuild =
        "https://cdn.jsdelivr.net/gh/Reeyuki/PlagueIncEvolved/Build/";
      const base = "https://cdn.jsdelivr.net/gh/Reeyuki/PlagueIncEvolved/";

      let loaded = 0;
      let totalGuess = 317 * 1024 * 1024;

      function update() {
        const mb = (loaded / 1024 / 1024).toFixed(1);
        const total = (totalGuess / 1024 / 1024).toFixed(0);
        document.getElementById("text").textContent =
          mb + " MB / " + total + " MB";
        document.getElementById("fill").style.width =
          (loaded / totalGuess) * 100 + "%";
      }

      async function fetchPart(url) {
        const res = await fetch(url);
        if (!res.ok) return null;
        const buf = await res.arrayBuffer();
        loaded += buf.byteLength;
        update();
        return new Uint8Array(buf);
      }

      /* CONFIG ONLY */
      const files = [
        { name: "1605eb800a276784e4a31d7e08c292ca.wasm", parts: 2 },
        { name: "c68552511e0497caf31a2ee65f4f53e3.data", parts: 15 },
      ];

      function buildUrls(file) {
        const urls = [];
        for (let i = 0; i < file.parts; i++) {
          urls.push(
            baseBuild + file.name + ".part" + String(i).padStart(2, "0"),
          );
        }
        return urls;
      }

      async function loadFile(file) {
        const urls = buildUrls(file);

        const buffers = await Promise.all(urls.map(fetchPart));

        let size = 0;
        for (const b of buffers) size += b.byteLength;

        const out = new Uint8Array(size);
        let off = 0;

        for (const b of buffers) {
          out.set(b, off);
          off += b.byteLength;
        }

        return out.buffer;
      }

      async function start() {
        const wasmFile = files[0];
        const dataFile = files[1];

        const wasmPromise = loadFile(wasmFile);
        const dataPromise = loadFile(dataFile);

        const [wasm, data] = await Promise.all([wasmPromise, dataPromise]);

        const wasmUrl = URL.createObjectURL(
          new Blob([wasm], { type: "application/wasm" }),
        );
        const dataUrl = URL.createObjectURL(new Blob([data]));

        document.getElementById("loader").style.display = "none";

        createUnityInstance(document.querySelector("#unity-canvas"), {
          dataUrl: dataUrl,
          frameworkUrl:
            baseBuild + "34cbf55c105d3d6cb061777c1afc3ae2.framework.js",
          codeUrl: wasmUrl,
          streamingAssetsUrl: base + "StreamingAssets",
          companyName: "Ndemic Creations",
          productName: "Plague Inc",
          productVersion: "1.18.3.2",
        });
      }

      start();
    </script>
  </body>
</html>
