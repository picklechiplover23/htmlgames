<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Inscryption Webport</title>
    <style>
      body {
        margin: 0;
        background: #0f0f10;
        color: #e6e6e6;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }
      #unity-canvas {
        width: 960px;
        height: 600px;
        display: block;
        margin: auto;
        background: #231f20;
      }
      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #0b0b0c;
      }
      #text {
        font-size: 13px;
        text-align: center;
      }
      #slider {
        width: 420px;
        accent-color: #7c5cff;
      }
      #fsBtn {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 10;
        background: #1a1a1d;
        color: #e6e6e6;
        border: 1px solid #333;
        padding: 8px 10px;
        cursor: pointer;
        border-radius: 6px;
      }
      #fsBtn:hover {
        background: #242428;
      }
    </style>
    <base
      href="https://cdn.jsdelivr.net/gh/SomeRandomFella/InscryptionWebport/"
    />
  </head>
  <body>
    <button id="fsBtn">Fullscreen</button>
    <div id="loader">
      <div id="text">Downloading...</div>
      <input id="slider" type="range" min="0" max="100" value="0" disabled />
    </div>
    <canvas id="unity-canvas"></canvas>

    <script src="Build/7a2dbded24d57e056180125b1583e7c4.loader.js"></script>
    <script>
      const EXPECTED_DATA_TOTAL_BYTES = 1448 * 1048576;
      const DATA_DOWNLOAD_CONCURRENCY = 8;

      const state = {
        total: EXPECTED_DATA_TOTAL_BYTES,
        loaded: 0,
        done: false,
      };

      function mb(v) {
        return v / 1048576;
      }

      function render() {
        const percent = state.total ? (state.loaded / state.total) * 100 : 0;
        document.getElementById("slider").value = percent;
        const text = document.getElementById("text");
        if (state.done) {
          text.textContent =
            "Download complete (" +
            mb(state.total).toFixed(2) +
            " MB) — Starting game...";
          return;
        }
        text.textContent =
          "Downloading: " +
          mb(state.loaded).toFixed(2) +
          " MB of " +
          mb(state.total).toFixed(2) +
          " MB (" +
          percent.toFixed(1) +
          "%)";
      }

      function generateDataPartSuffixes() {
        const alpha = "abcdefghijklmnopqrstuvwxyz";
        const suffixes = [];
        for (let j = 0; j < 26; j++) suffixes.push("a" + alpha[j]); // aa-az
        for (let j = 0; j < 26; j++) suffixes.push("b" + alpha[j]); // ba-bz
        for (let j = 0; j <= 20; j++) suffixes.push("c" + alpha[j]); // ca-cu
        return suffixes;
      }

      // Pre-download everything up front, store blob URLs so Unity gets them instantly
      async function preloadAssets() {
        const suffixes = generateDataPartSuffixes();
        const totalParts = suffixes.length;
        const dataBase = "Build/473b9593aa93436d0dfd3c30217f126b.data.part_";
        const wasmBase = "Build/2a21aa2df9743ada0aa5cac7d789934d.wasm.part";

        // --- Download DATA concurrently ---
        const dataChunks = new Array(totalParts);
        let loadedBytes = 0;
        let nextIndex = 0;

        async function dataWorker() {
          while (true) {
            const i = nextIndex++;
            if (i >= totalParts) return;
            const res = await fetch(dataBase + suffixes[i]);
            if (!res.ok) throw new Error("Failed: " + dataBase + suffixes[i]);
            const buf = await res.arrayBuffer();
            dataChunks[i] = buf;
            loadedBytes += buf.byteLength;
            state.loaded = Math.min(EXPECTED_DATA_TOTAL_BYTES, loadedBytes);
            render();
          }
        }

        const workers = [];
        for (let i = 0; i < DATA_DOWNLOAD_CONCURRENCY; i++)
          workers.push(dataWorker());
        await Promise.all(workers);

        const dataBlob = new Blob(dataChunks);
        const dataBlobUrl = URL.createObjectURL(dataBlob);

        // --- Download WASM sequentially, auto-detect part count ---
        const wasmChunks = [];
        for (let i = 0; i < 99; i++) {
          const partName = wasmBase + "_" + String(i).padStart(2, "0");
          const res = await fetch(partName);
          if (res.status === 404 || res.status === 403) break;
          if (!res.ok) throw new Error("Failed: " + partName);
          wasmChunks.push(await res.arrayBuffer());
        }
        if (wasmChunks.length === 0) throw new Error("No WASM parts found");

        const wasmBlob = new Blob(wasmChunks, { type: "application/wasm" });
        const wasmBlobUrl = URL.createObjectURL(wasmBlob);

        state.done = true;
        render();

        return { dataBlobUrl, wasmBlobUrl };
      }

      const canvas = document.getElementById("unity-canvas");

      document.getElementById("fsBtn").onclick = function () {
        if (canvas.requestFullscreen) canvas.requestFullscreen();
        else if (canvas.webkitRequestFullscreen)
          canvas.webkitRequestFullscreen();
        else if (canvas.mozRequestFullScreen) canvas.mozRequestFullScreen();
        else if (canvas.msRequestFullscreen) canvas.msRequestFullscreen();
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        const meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content =
          "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no";
        document.head.appendChild(meta);
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";
      }

      render();

      preloadAssets()
        .then(({ dataBlobUrl, wasmBlobUrl }) => {
          // Pass the blob URLs directly — no fetch interception needed
          createUnityInstance(canvas, {
            dataUrl: dataBlobUrl,
            frameworkUrl: "Build/7492dd364cd7595cfa9d018ad373b295.framework.js",
            codeUrl: wasmBlobUrl,
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Daniel Mullins Games",
            productName: "Inscryption",
            productVersion: "Release",
          })
            .then(() => {
              document.getElementById("loader").style.display = "none";
            })
            .catch((err) => {
              document.getElementById("text").textContent =
                "Unity error: " + err;
              console.error(err);
            });
        })
        .catch((err) => {
          document.getElementById("text").textContent =
            "Download error: " + err.message;
          console.error(err);
        });
    </script>
  </body>
</html>
