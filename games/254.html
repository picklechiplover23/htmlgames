<!doctype html>
<html lang="en">

    <title>Effing Worms 2</title>

      html,
      body {
        margin: 0;
        padding: 0;
        background: black;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #game {
        width: 100vw;
        height: 100vh;
      }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ruffle-rs/0.2.0-nightly.2025.9.29/ruffle.min.js"></script>

        player.style.width = "100vw";
        player.style.height = "100vh";

        document.body.appendChild(player);

        player.load(
          "https://cdn.jsdelivr.net/gh/tyler6974/gxmehub-assests@897732f336fe655d87857c296c122a0bc3fd9269/swf/effingworms2_9.swf",
        );
